<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Offline — FM Macedonia</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, 'Figtree', system-ui, sans-serif;
            background: #121212;
            color: #fff;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 24px;
            padding: 24px;
            text-align: center;
        }
        .icon { opacity: .5; }
        h1 { font-size: 1.5rem; font-weight: 700; }
        p  { color: #A7A7A7; font-size: .95rem; max-width: 340px; line-height: 1.6; }
        a  {
            display: inline-flex; align-items: center; gap: 8px;
            background: #1ED760; color: #000;
            font-weight: 700; font-size: .875rem;
            padding: 10px 22px; border-radius: 50px;
            text-decoration: none; margin-top: 8px;
        }
        a:hover { background: #17b84f; }
    </style>
</head>
<body>
    <svg class="icon" width="64" height="64" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 52 Q50 14 86 52" stroke="#1ED760" stroke-width="6" stroke-linecap="round" opacity="0.3"/>
        <path d="M24 52 Q50 24 76 52" stroke="#1ED760" stroke-width="6" stroke-linecap="round" opacity="0.6"/>
        <path d="M34 52 Q50 34 66 52" stroke="#1ED760" stroke-width="6" stroke-linecap="round"/>
        <line x1="50" y1="52" x2="50" y2="70" stroke="#1ED760" stroke-width="5.5" stroke-linecap="round"/>
        <line x1="36" y1="70" x2="64" y2="70" stroke="#1ED760" stroke-width="5" stroke-linecap="round"/>
        <line x1="39" y1="70" x2="28" y2="86" stroke="#1ED760" stroke-width="4.5" stroke-linecap="round"/>
        <line x1="61" y1="70" x2="72" y2="86" stroke="#1ED760" stroke-width="4.5" stroke-linecap="round"/>
    </svg>
    <h1>You're offline</h1>
    <p>Radio streams require an internet connection. Reconnect to start listening to Macedonian FM stations.</p>
    <a href="/" onclick="location.reload()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.48"/></svg>
        Try again
    </a>
</body>
</html>
